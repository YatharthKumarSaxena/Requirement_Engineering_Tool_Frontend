<div class="page-container">
  <div class="page-header">
    <div class="page-title-section">
      <h1 class="page-title">Activity Log</h1>
      <p class="page-subtitle">Track all project changes and activities</p>
    </div>
    <button class="btn btn-secondary" id="btnExportActivity">
      <span class="btn-icon">📥</span> Export Log
    </button>
  </div>

  <!-- Filters -->
  <div class="filters-bar">
    <div class="filter-group">
      <label for="filterActivityType" class="filter-label">Activity Type</label>
      <select id="filterActivityType" class="filter-select">
        <option value="">Most Recent Activities</option>
        <option value="CREATE_PROJECT">Project Created</option>
        <option value="UPDATE_PROJECT">Project Updated</option>
        <option value="DELETE_PROJECT">Project Deleted</option>
        <option value="CREATE_INCEPTION">Inception Created</option>
        <option value="UPDATE_INCEPTION">Inception Updated</option>
        <option value="CREATE_COMMENT">Comment Added</option>
        <option value="CREATE_STAKEHOLDER">Stakeholder Added</option>
      </select>
    </div>

    <div class="filter-group">
      <label for="searchActivity" class="filter-label">Search</label>
      <input type="text" id="searchActivity" class="filter-input" placeholder="Search by description, event, user..." />
    </div>
  </div>

  <!-- Pagination Controls -->
  <div style="display: flex; justify-content: space-between; align-items: center; margin: 15px 0; padding: 10px; background: #f5f5f5; border-radius: 4px;">
    <button class="btn btn-secondary" id="btnPrevPage" style="padding: 6px 12px; font-size: 13px;">← Previous</button>
    <span id="pageInfo" style="font-size: 13px; color: #666; font-weight: 500;">Page 1 of 0</span>
    <button class="btn btn-secondary" id="btnNextPage" style="padding: 6px 12px; font-size: 13px;">Next →</button>
  </div>

  <!-- Activity Timeline -->
  <div id="activityContainer" class="activity-timeline">
    <div class="loading-spinner">
      <div class="loader"><div class="cell d-0"></div><div class="cell d-1"></div><div class="cell d-2"></div><div class="cell d-1"></div><div class="cell d-2"></div><div class="cell d-3"></div><div class="cell d-2"></div><div class="cell d-3"></div><div class="cell d-4"></div></div>
      Loading activity log...
    </div>
  </div>

  <!-- Empty State -->
  <div id="emptyActivity" class="empty-state hidden">
    <div class="empty-state-icon">📋</div>
    <h3>No Activities Yet</h3>
    <p>Activities will appear here as you work on your project</p>
  </div>
</div>
