<div class="page-container">
  <div class="page-header">
    <div class="page-title-section">
      <h1 class="page-title">Stakeholders</h1>
      <p class="page-subtitle">Manage project stakeholders and roles</p>
    </div>
    <button class="btn btn-primary" id="btnAddStakeholder">
      <span class="btn-icon">➕</span> Add Stakeholder
    </button>
  </div>

  <!-- Stakeholders Grid -->
  <div id="stakeholdersContainer" class="stakeholders-grid">
    <div class="loading-spinner">
      <div class="loader"><div class="cell d-0"></div><div class="cell d-1"></div><div class="cell d-2"></div><div class="cell d-1"></div><div class="cell d-2"></div><div class="cell d-3"></div><div class="cell d-2"></div><div class="cell d-3"></div><div class="cell d-4"></div></div>
      Loading stakeholders...
    </div>
  </div>

  <!-- Empty State -->
  <div id="emptyStakeholders" class="empty-state hidden">
    <div class="empty-state-icon">👥</div>
    <h3>No Stakeholders Yet</h3>
    <p>Add stakeholders who will be involved in requirements engineering</p>
    <button class="btn btn-primary" id="btnAddStakeholderEmpty">Add First Stakeholder</button>
  </div>
</div>

<!-- Add/Edit Stakeholder Modal -->
<div id="stakeholderModal" class="modal hidden">
  <div class="modal-content modal-lg">
    <div class="modal-header">
      <h2 id="stakeholderModalTitle">Add Stakeholder</h2>
      <button class="modal-close" data-close-modal="stakeholderModal">&times;</button>
    </div>
    <form id="stakeholderForm" class="form-stack">
      <div class="form-group">
        <label for="stakeholderUserId" class="form-label">User ID *</label>
        <input type="text" id="stakeholderUserId" class="form-control" placeholder="USR-xxxxxx" required maxlength="20" />
        <span class="form-error" id="error-stakeholderUserId"></span>
      </div>

      <div class="form-group">
        <label for="stakeholderRole" class="form-label">Role *</label>
        <select id="stakeholderRole" class="form-control" required>
          <option value="">Select Role</option>
          <optgroup label="Project Roles">
            <option value="manager">Manager</option>
            <option value="developer">Developer</option>
            <option value="tester">Tester</option>
            <option value="analyst">Analyst</option>
            <option value="owner">Owner</option>
            <option value="other">Other</option>
          </optgroup>
          <optgroup label="Client Roles">
            <option value="sponsor">Sponsor</option>
            <option value="partner">Partner</option>
            <option value="vendor">Vendor</option>
            <option value="end_user">End User</option>
          </optgroup>
        </select>
        <span class="form-error" id="error-stakeholderRole"></span>
      </div>

      <div class="form-group">
        <label for="stakeholderOrgId" class="form-label">Organization ID (Optional)</label>
        <input type="text" id="stakeholderOrgId" class="form-control" placeholder="For multi-organization projects" maxlength="24" />
        <span class="form-error" id="error-stakeholderOrgId"></span>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-secondary" data-close-modal="stakeholderModal">Cancel</button>
        <button type="submit" class="btn btn-primary">Save Stakeholder</button>
      </div>
    </form>
  </div>
</div>

<!-- Delete Stakeholder Modal -->
<div id="deleteStakeholderModal" class="modal hidden">
  <div class="modal-content">
    <div class="modal-header">
      <h2>Remove Stakeholder</h2>
      <button class="modal-close" data-close-modal="deleteStakeholderModal">&times;</button>
    </div>
    <form id="deleteStakeholderForm" class="form-stack">
      <p class="text-muted">Please select a reason for removing this stakeholder:</p>
      
      <div class="form-group">
        <label for="deletionReason" class="form-label">Deletion Reason *</label>
        <select id="deletionReason" class="form-control" required>
          <option value="">Select Reason</option>
          <option value="duplicate_stakeholder">Duplicate Stakeholder</option>
          <option value="test_or_demo_stakeholder_cleanup">Test/Demo Stakeholder Cleanup</option>
          <option value="created_by_admin_mistake">Created by Admin Mistake</option>
          <option value="organization_removed_from_client">Organization Removed from Client</option>
          <option value="other">Other</option>
        </select>
        <span class="form-error" id="error-deletionReason"></span>
      </div>

      <div class="form-group">
        <label for="deletionDescription" class="form-label">Description (Optional)</label>
        <textarea id="deletionDescription" class="form-control" rows="2" maxlength="300" placeholder="Additional details about this deletion..."></textarea>
        <span class="form-error" id="error-deletionDescription"></span>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-secondary" data-close-modal="deleteStakeholderModal">Cancel</button>
        <button type="submit" class="btn btn-danger">Confirm Removal</button>
      </div>
    </form>
  </div>
</div>
